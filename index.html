<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LYRAE Voice — Narrative Mirror</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      background-color: #0c0a09;
      color: #ede9e0;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      letter-spacing: 0.01em;
      padding: 0 24px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 0 120px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 72px;
      animation: fadeUp 0.9s ease both;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #c4a870;
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(42px, 7vw, 68px);
      line-height: 1.0;
      letter-spacing: -0.01em;
      color: #ede9e0;
      margin-bottom: 20px;
    }

    h1 em {
      font-style: italic;
      color: #c4a870;
    }

    .subtitle {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #6b6358;
    }

    .divider {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, #3a342c, transparent);
      margin: 0 auto 72px;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    /* Form */
    form {
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .field {
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #6b6358;
      font-weight: 400;
      margin-bottom: 12px;
    }

    label span {
      color: #3d3830;
      margin-left: 6px;
    }

    textarea {
      width: 100%;
      background: #111009;
      border: 1px solid #2a2520;
      border-radius: 2px;
      color: #ede9e0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 300;
      line-height: 1.75;
      padding: 20px 22px;
      resize: none;
      outline: none;
      transition: border-color 0.3s ease;
      caret-color: #c4a870;
    }

    textarea::placeholder {
      color: #3a342c;
      font-style: italic;
    }

    textarea:focus {
      border-color: #3d3830;
    }

    textarea.small {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.6;
    }

    button[type="submit"] {
      width: 100%;
      padding: 20px;
      background: #ede9e0;
      color: #0c0a09;
      border: none;
      border-radius: 2px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: #c4a870;
    }

    button[type="submit"]:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Output */
    #output-wrap {
      margin-top: 64px;
      border-top: 1px solid #1e1c18;
      padding-top: 48px;
      display: none;
    }

    #output-wrap.visible {
      display: block;
      animation: fadeUp 0.7s ease both;
    }

    .output-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #6b6358;
      font-weight: 400;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #copy-btn {
      background: none;
      border: 1px solid #2a2520;
      color: #6b6358;
      font-family: 'Jost', sans-serif;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 1px;
      transition: all 0.25s ease;
    }

    #copy-btn:hover {
      border-color: #c4a870;
      color: #c4a870;
    }

    #copy-btn.copied {
      color: #c4a870;
      border-color: #c4a870;
    }

    #output-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 300;
      line-height: 1.85;
      color: #d8d2c5;
      white-space: pre-wrap;
      animation: textReveal 0.8s ease both;
    }

    #output-text p { margin-bottom: 1.4em; }

    /* Loading */
    #loading {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 36px 0;
      margin-top: 48px;
    }

    #loading.visible { display: flex; }

    .loading-bar {
      height: 1px;
      background: linear-gradient(to right, transparent, #c4a870, transparent);
      animation: shimmer 2s ease-in-out infinite;
      flex: 1;
    }

    .loading-text {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #4a4540;
      white-space: nowrap;
    }

    /* Error */
    #error-msg {
      display: none;
      margin-top: 32px;
      font-size: 13px;
      font-family: 'Jost', sans-serif;
      color: #6b6358;
    }

    #error-msg.visible { display: block; }

    /* Footer */
    footer {
      text-align: center;
      margin-top: 80px;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #2e2a25;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { opacity: 0.3; }
      50%  { opacity: 1; }
      100% { opacity: 0.3; }
    }

    @keyframes textReveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <div class="wordmark">LYRAE</div>
      <h1>Narrative<br><em>Mirror</em></h1>
      <p class="subtitle">Identity excavation system</p>
    </header>

    <div class="divider"></div>

    <form id="refine-form">
      <div class="field">
        <label>Raw Story <span>— what actually happened</span></label>
        <textarea
          id="input"
          rows="9"
          placeholder="Write it raw. Unpolished. The version you haven't shared yet."
          required
        ></textarea>
      </div>

      <div class="field">
        <label>Direction <span>— optional</span></label>
        <textarea
          id="instruction"
          class="small"
          rows="3"
          placeholder="Leave blank to let the mirror decide. Or give it a thread to pull."
        ></textarea>
      </div>

      <button type="submit" id="submit-btn">Refine Narrative</button>
    </form>

    <div id="loading">
      <div class="loading-bar"></div>
      <span class="loading-text">Finding the thread</span>
      <div class="loading-bar"></div>
    </div>

    <p id="error-msg"></p>

    <div id="output-wrap">
      <div class="output-label">
        <span>Refined Narrative</span>
        <button id="copy-btn" type="button">Copy</button>
      </div>
      <div id="output-text"></div>
    </div>

    <footer>LYRAE Voice &nbsp;&middot;&nbsp; Narrative Mirror</footer>

  </div>

  <script>
    const form = document.getElementById('refine-form');
    const submitBtn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const outputWrap = document.getElementById('output-wrap');
    const outputText = document.getElementById('output-text');
    const errorMsg = document.getElementById('error-msg');
    const copyBtn = document.getElementById('copy-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const input = document.getElementById('input').value.trim();
      const instruction = document.getElementById('instruction').value.trim();

      if (!input) return;

      // Reset
      submitBtn.disabled = true;
      submitBtn.textContent = 'Excavating';
      loading.classList.add('visible');
      outputWrap.classList.remove('visible');
      errorMsg.classList.remove('visible');
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/refine', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ input, instruction }),
        });

        const data = await res.json();

        if (!res.ok || data.error) {
          throw new Error(data.error || 'Server error');
        }

        // Render output
        const paragraphs = data.output
          .split(/\n\n+/)
          .filter(Boolean)
          .map(p => `<p>${p}</p>`)
          .join('');

        outputText.innerHTML = paragraphs;
        outputText._raw = data.output;
        outputWrap.classList.add('visible');
        outputWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });

      } catch (err) {
        errorMsg.textContent = err.message || 'Something went wrong. Please try again.';
        errorMsg.classList.add('visible');
      }

      loading.classList.remove('visible');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Refine Narrative';
    });

    copyBtn.addEventListener('click', () => {
      const text = outputText._raw || outputText.innerText;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied';
        copyBtn.classList.add('copied');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
